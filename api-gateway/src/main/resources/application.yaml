server:
  port: 8090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:

          - id: ms-usuarios
            uri: lb://MS-USUARIOS
            predicates:
              - Path=/api/usuarios/**

          - id: ms-pacientes
            uri: lb://MS-PACIENTES
            predicates:
              - Path=/api/pacientes/**

          - id: ms-medicos
            uri: lb://MS-MEDICOS
            predicates:
              - Path=/api/medicos/**

          - id: ms-farmacia
            uri: lb://MS-FARMACIA
            predicates:
              - Path=/api/medicamentos/**

          - id: ms-reservas
            uri: lb://MS-RESERVAS
            predicates:
              - Path=/api/reservas/**

          - id: ms-examenes
            uri: lb://MS-EXAMENES
            predicates:
              - Path=/api/examenes/**

          - id: ms-fichas-clinicas
            uri: lb://MS-FICHAS-CLINICAS
            predicates:
              - Path=/api/fichas/**

          - id: ms-recetas
            uri: lb://MS-RECETAS
            predicates:
              - Path=/api/recetas/**

          - id: ms-pagos
            uri: lb://MS-PAGOS
            predicates:
              - Path=/api/pagos/**

          - id: ms-notificaciones
            uri: lb://MS-NOTIFICACIONES
            predicates:
              - Path=/api/notificaciones/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: INFO