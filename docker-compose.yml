services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    image: eclipse-temurin:21-jre-alpine
    container_name: eureka-server
    restart: unless-stopped
    volumes:
      - ./apps/eureka-server.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar", "--eureka.client.register-with-eureka=false", "--eureka.client.fetch-registry=false"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
    ports:
      - "8761:8761"

  api-gateway:
    image: eclipse-temurin:21-jre-alpine
    container_name: api-gateway
    restart: unless-stopped
    volumes:
      - ./apps/api-gateway.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar", "--eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8094
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8094:8094"
    depends_on:
      - eureka-server

  msusuarios:
    image: eclipse-temurin:21-jre-alpine
    container_name: msusuarios
    restart: unless-stopped
    volumes:
      - ./apps/msusuarios.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar", "--eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: "jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${DB_USUARIOS}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

